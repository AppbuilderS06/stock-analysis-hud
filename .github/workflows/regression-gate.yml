name: regression-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  regression:
    name: Regression Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pandas numpy

      - name: ① Syntax check
        run: |
          python -m py_compile app.py
          echo "✅ Syntax clean"

      - name: ② No duplicate global definitions
        run: |
          python - << 'EOF'
          import ast, sys
          src = open("app.py").read()
          tree = ast.parse(src)
          names = [n.targets[0].id for n in ast.walk(tree)
                   if isinstance(n, ast.Assign) and len(n.targets)==1
                   and isinstance(n.targets[0], ast.Name)]
          failed = False
          for name in ["MULTI_LISTED", "INFO_LINKS", "VERDICT_COLORS"]:
              c = names.count(name)
              if c != 1:
                  print(f"FAIL: {name} defined {c}x")
                  failed = True
          if failed:
              sys.exit(1)
          print("✅ No duplicate definitions")
          EOF

      - name: ③ Cache version consistent
        run: |
          python - << 'EOF'
          import re, sys
          src = open("app.py").read()
          d = re.search(r'def fetch_ticker_data\([^)]*_v\s*=\s*(\d+)', src)
          c = re.search(r'fetch_ticker_data\([^)]*_v\s*=\s*(\d+)', src)
          assert d and c, "Cannot find _v parameter"
          assert d.group(1) == c.group(1), f"Version mismatch: def={d.group(1)} call={c.group(1)}"
          print(f"✅ Cache version _v={d.group(1)} consistent")
          EOF

      - name: ④ No SVG in st.markdown
        run: |
          python - << 'EOF'
          import re, sys
          src = open("app.py").read()
          lines = src.split("\n")
          hits = [f"L{i+1}" for i, l in enumerate(lines)
                  if "st.markdown" in l and "<svg" in l]
          if hits:
              print(f"FAIL: SVG in st.markdown at {hits}")
              sys.exit(1)
          print("✅ No SVG in st.markdown")
          EOF

      - name: ⑤ No st.form usage
        run: |
          if grep -n "st\.form\b" app.py; then
            echo "FAIL: st.form breaks live dropdown"
            exit 1
          fi
          echo "✅ No st.form"

      - name: ⑥ FMP rate limit guard
        run: |
          python - << 'EOF'
          import sys
          src = open("app.py").read()
          if "Error Message" not in src or '"message"' not in src:
              print("FAIL: FMP rate limit guard missing")
              sys.exit(1)
          print("✅ FMP rate limit guard present")
          EOF

      - name: ⑦ Static analysis tests
        run: pytest tests/test_static_analysis.py -v

      - name: ⑧ Data layer tests
        run: pytest tests/test_data_layer.py -v

      - name: ⑨ Calculator tests
        run: pytest tests/test_calculator.py -v

      - name: ⑩ Insider classification tests
        run: pytest tests/test_insider.py -v

      - name: ⑪ Indicator tests
        run: pytest tests/test_indicators.py -v

      - name: ⑫ Dropdown logic tests
        run: pytest tests/test_dropdown.py -v

      - name: ⑬ Full suite with coverage
        run: |
          pytest tests/ --cov=. --cov-report=term-missing -q

      - name: Block merge on failure
        if: failure()
        run: |
          echo "❌ Regression gate FAILED — merge blocked"
          exit 1
